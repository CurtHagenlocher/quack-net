name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to attach the release to (e.g. v0.1.0). Must already exist. Leave blank for a dry run.'
        required: false
      dry_run:
        description: 'Build artifacts only; do not create a GitHub release.'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-native:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ steps.derive-version.outputs.version }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            lib: quack_adbc.dll
          - os: windows-11-arm
            rid: win-arm64
            lib: quack_adbc.dll
          - os: ubuntu-latest
            rid: linux-x64
            lib: quack_adbc.so
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            lib: quack_adbc.so
          - os: macos-latest
            rid: osx-arm64
            lib: quack_adbc.dylib

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Derive version from tag
        id: derive-version
        shell: pwsh
        run: |
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ inputs.tag }}' } else { '${{ github.ref_name }}' }
          # Dry runs (and any other tagless dispatch) get a synthetic SemVer
          # so artifact filenames are still meaningful.
          if ([string]::IsNullOrEmpty($tag)) {
              $tag = "v0.0.0-dryrun.${{ github.run_number }}"
          }
          # Strip leading 'v' to get a SemVer string.
          $version = $tag -replace '^v', ''
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Tag: $tag  Version: $version"

      - name: Restore
        run: dotnet restore quack-net.slnx

      - name: Build (managed)
        run: dotnet build quack-net.slnx -c Release --no-restore -p:Version=${{ steps.derive-version.outputs.version }}

      - name: Unit tests
        # Run unit tests only on Linux x64 — they're pure managed and the
        # result is the same on every host. Skipping on the other runners
        # saves ~2 minutes of redundant CPU per release.
        if: matrix.rid == 'linux-x64'
        run: dotnet test test/Quack.Tests/Quack.Tests.csproj -c Release --no-build --verbosity normal

      - name: Publish Native AOT
        shell: pwsh
        run: |
          pwsh scripts/publish-native.ps1 -Runtime ${{ matrix.rid }} -Configuration Release

      - name: Stage release asset
        shell: pwsh
        run: |
          $version = '${{ steps.derive-version.outputs.version }}'
          $rid     = '${{ matrix.rid }}'
          $lib     = '${{ matrix.lib }}'
          $src     = "src/Quack.Adbc.Native/bin/Release/net10.0/$rid/publish/$lib"
          $stem    = [System.IO.Path]::GetFileNameWithoutExtension($lib)
          $ext     = [System.IO.Path]::GetExtension($lib)
          $assetName = "$stem-$version-$rid$ext"
          New-Item -ItemType Directory -Force artifacts | Out-Null
          $dst = Join-Path 'artifacts' $assetName
          Copy-Item $src $dst
          $hash = (Get-FileHash $dst -Algorithm SHA256).Hash
          "$hash  $assetName" | Out-File "$dst.sha256" -Encoding ascii
          Get-ChildItem artifacts

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: quack_adbc-${{ matrix.rid }}
          path: artifacts/
          if-no-files-found: error

  build-powerbi:
    name: Build Power BI connector
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Package quack.mez
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Compress-Archive -Path powerbi/* -DestinationPath artifacts/quack.mez

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: quack-powerbi
          path: artifacts/
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: [build-native, build-powerbi]
    if: ${{ github.event_name == 'push' || inputs.dry_run != true }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true
